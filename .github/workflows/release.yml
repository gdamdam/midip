name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build & release (e.g. v1.0.0). Leave blank to use the tag selected in "Use workflow from".'
        required: false
        type: string

env:
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install ALSA dev headers (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Determine binary name and staging dir
        id: vars
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          ARCHIVE_NAME="midip-${TAG}-${{ matrix.target }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "archive_name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
          echo "staging=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            echo "binary=midip.exe" >> "$GITHUB_OUTPUT"
          else
            echo "binary=midip" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage release artifacts (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          STAGING="${{ steps.vars.outputs.staging }}"
          mkdir -p "${STAGING}"
          cp "target/${{ matrix.target }}/release/${{ steps.vars.outputs.binary }}" "${STAGING}/"
          [ -f README.md ]   && cp README.md   "${STAGING}/"
          [ -f LICENSE ]     && cp LICENSE      "${STAGING}/"
          [ -f CHANGELOG.md ] && cp CHANGELOG.md "${STAGING}/"
          [ -d assets ] && cp -R assets "${STAGING}/"

      - name: Stage release artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $staging = "${{ steps.vars.outputs.staging }}"
          New-Item -ItemType Directory -Force -Path $staging
          Copy-Item "target\${{ matrix.target }}\release\${{ steps.vars.outputs.binary }}" $staging\
          if (Test-Path README.md)    { Copy-Item README.md    $staging\ }
          if (Test-Path LICENSE)      { Copy-Item LICENSE      $staging\ }
          if (Test-Path CHANGELOG.md) { Copy-Item CHANGELOG.md $staging\ }
          if (Test-Path assets) { Copy-Item -Recurse assets $staging\ }

      - name: Create archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          STAGING="${{ steps.vars.outputs.staging }}"
          tar czf "${STAGING}.tar.gz" "${STAGING}"

      - name: Create archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $staging = "${{ steps.vars.outputs.staging }}"
          Compress-Archive -Path $staging -DestinationPath "${staging}.zip"

      - name: Generate SHA256 checksum (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          ARCHIVE="${{ steps.vars.outputs.archive_name }}.${{ matrix.archive_ext }}"
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Generate SHA256 checksum (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $archive = "${{ steps.vars.outputs.archive_name }}.${{ matrix.archive_ext }}"
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ascii "${archive}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ steps.vars.outputs.archive_name }}.${{ matrix.archive_ext }}
            ${{ steps.vars.outputs.archive_name }}.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error

  build-gui:
    name: Build GUI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            bundles: dmg
          - target: x86_64-apple-darwin
            os: macos-latest
            bundles: dmg
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bundles: nsis,msi
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bundles: deb,appimage

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri
          key: gui-release-${{ matrix.target }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux GUI dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libayatana-appindicator3-dev libasound2-dev

      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci

      - name: Stamp release version into tauri.conf.json
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          # Accept v1.2.3 / 1.2.3 (+ optional -rc.1 etc.); strip a leading "v".
          VER="${TAG#v}"
          if [[ ! "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+].*)?$ ]]; then
            echo "Ref '$TAG' is not a semver tag — leaving tauri.conf.json version unchanged."
            exit 0
          fi
          CONF="gui/src-tauri/tauri.conf.json"
          jq --arg v "$VER" '.version = $v' "$CONF" > "$CONF.tmp"
          mv "$CONF.tmp" "$CONF"
          echo "Stamped GUI version -> $VER"
          jq -r '.version' "$CONF"

      - name: Build Tauri bundles
        working-directory: gui
        # `beforeBuildCommand` (svelte-check + vite build) runs automatically.
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Collect + rename bundles
        id: gui
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          OUT="gui-dist"
          mkdir -p "$OUT"
          BUNDLE="gui/src-tauri/target/${{ matrix.target }}/release/bundle"
          shopt -s nullglob
          found=0
          for f in \
            "$BUNDLE"/dmg/*.dmg \
            "$BUNDLE"/nsis/*-setup.exe \
            "$BUNDLE"/msi/*.msi \
            "$BUNDLE"/deb/*.deb \
            "$BUNDLE"/appimage/*.AppImage; do
            base="$(basename "$f")"
            dest="$OUT/midip-gui-${TAG}-${{ matrix.target }}-${base}"
            cp "$f" "$dest"
            sha256sum "$dest" > "${dest}.sha256"
            found=$((found+1))
          done
          if [ "$found" -eq 0 ]; then
            echo "No GUI bundles were produced for ${{ matrix.target }}" >&2
            ls -R "$BUNDLE" || true
            exit 1
          fi
          ls -la "$OUT"

      - name: Upload GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-release-${{ matrix.target }}
          path: gui-dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build, build-gui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          draft: false
          prerelease: ${{ contains(needs.build.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.sha256
