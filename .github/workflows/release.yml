name: Release

on:
  push:
    tags:
      - 'v*'

env:
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install ALSA dev headers (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Determine binary name and staging dir
        id: vars
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE_NAME="midip-${TAG}-${{ matrix.target }}"
          echo "archive_name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
          echo "staging=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            echo "binary=midip.exe" >> "$GITHUB_OUTPUT"
          else
            echo "binary=midip" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage release artifacts (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          STAGING="${{ steps.vars.outputs.staging }}"
          mkdir -p "${STAGING}"
          cp "target/${{ matrix.target }}/release/${{ steps.vars.outputs.binary }}" "${STAGING}/"
          [ -f README.md ]   && cp README.md   "${STAGING}/"
          [ -f LICENSE ]     && cp LICENSE      "${STAGING}/"
          [ -f CHANGELOG.md ] && cp CHANGELOG.md "${STAGING}/"

      - name: Stage release artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $staging = "${{ steps.vars.outputs.staging }}"
          New-Item -ItemType Directory -Force -Path $staging
          Copy-Item "target\${{ matrix.target }}\release\${{ steps.vars.outputs.binary }}" $staging\
          if (Test-Path README.md)    { Copy-Item README.md    $staging\ }
          if (Test-Path LICENSE)      { Copy-Item LICENSE      $staging\ }
          if (Test-Path CHANGELOG.md) { Copy-Item CHANGELOG.md $staging\ }

      - name: Create archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          STAGING="${{ steps.vars.outputs.staging }}"
          tar czf "${STAGING}.tar.gz" "${STAGING}"

      - name: Create archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $staging = "${{ steps.vars.outputs.staging }}"
          Compress-Archive -Path $staging -DestinationPath "${staging}.zip"

      - name: Generate SHA256 checksum (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          ARCHIVE="${{ steps.vars.outputs.archive_name }}.${{ matrix.archive_ext }}"
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Generate SHA256 checksum (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $archive = "${{ steps.vars.outputs.archive_name }}.${{ matrix.archive_ext }}"
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ascii "${archive}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ steps.vars.outputs.archive_name }}.${{ matrix.archive_ext }}
            ${{ steps.vars.outputs.archive_name }}.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
